function AchievementModal({ achievement, onClose }) {
  if (!achievement) return null;
  return (
    <div 
      className="fixed inset-0 z-[150] flex items-center justify-center bg-black/70 backdrop-blur-md animate-in fade-in duration-300 pointer-events-auto"
      onClick={onClose}
    >
      <div className="relative w-[85%] max-w-sm bg-[#0A0A0A]/90 border border-white/10 rounded-[2rem] p-8 shadow-2xl flex flex-col items-center text-center overflow-hidden animate-in zoom-in-95 duration-300">
        
        {/* 极简高级光晕 (对角线呼吸分布) */}
        <div className="absolute top-0 right-0 w-32 h-32 bg-[var(--ring-active)]/20 blur-[50px] pointer-events-none rounded-full"></div>
        <div className="absolute bottom-0 left-0 w-32 h-32 bg-[var(--ring-active)]/10 blur-[50px] pointer-events-none rounded-full"></div>

        <Trophy size={32} strokeWidth={1.5} className="text-[var(--ring-active)] mb-5 relative z-10" />
        
        {/* 顶部小标题：时间和状态 */}
        <h2 className="text-[11px] font-bold tracking-[0.4em] text-white/50 uppercase mb-6 relative z-10">
          里程碑解锁 / {achievement.hours} 小时

// 终极交互：地球之门 (EarthPortal) - 自转与纯白光环版
// ==========================================
// ==========================================
// 终极交互：地球之门 (EarthPortal) - 逼真自转与闪耀光环版
// ==========================================
// ==========================================
// 终极交互：地球之门 (EarthPortal) - 逼真自转与闪耀光环版
// ==========================================
function EarthPortal({ onComplete }) {
  const [progress, setProgress] = React.useState(0);
  const [isDragging, setIsDragging] = React.useState(false);
  const [isCompleted, setIsCompleted] = React.useState(false);
  const containerRef = React.useRef(null);

  React.useEffect(() => {
    const handleMove = (e) => {
      if (!isDragging || isCompleted || !containerRef.current) return;
      e.preventDefault();
      
      const rect = containerRef.current.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;

      let angle = Math.atan2(clientY - cy, clientX - cx) * (180 / Math.PI) + 90;
      if (angle < 0) angle += 360;

      let newProgress = angle / 360;

      if (progress > 0.8 && newProgress < 0.2) {
        setProgress(1);
        setIsCompleted(true);
        triggerHaptic('heavy');
        setTimeout(onComplete, 2000); 
      } else if (progress < 0.2 && newProgress > 0.8) {
        setProgress(0); 
      } else {
        setProgress(newProgress);
      }
    };

    const handleUp = () => setIsDragging(false);

    if (isDragging) {
      window.addEventListener('pointermove', handleMove, { passive: false });
      window.addEventListener('touchmove', handleMove, { passive: false });
      window.addEventListener('pointerup', handleUp);
      window.addEventListener('touchend', handleUp);
    }
    return () => {
      window.removeEventListener('pointermove', handleMove);
      window.removeEventListener('touchmove', handleMove);
      window.removeEventListener('pointerup', handleUp);
      window.removeEventListener('touchend', handleUp);
    };
  }, [isDragging, progress, isCompleted, onComplete]);

  return (
    <div className="absolute inset-0 flex flex-col items-center justify-center animate-in fade-in duration-[3000ms] ease-out touch-none bg-black"
         style={{ backgroundImage: 'radial-gradient(ellipse at 50% 50%, rgba(20,30,45,0.4) 0%, rgba(0,0,0,1) 80%)' }}>
      
      <style>{`
        @keyframes earth-fast-rotation {
          from { transform: rotate(0deg); }
          to { transform: rotate(360deg); }
        }
        @keyframes text-float {
          0%, 100% { transform: translateY(0px); }
          50% { transform: translateY(-6px); }
        }
        @keyframes ring-breath {
          0%, 100% { opacity: 0.3; filter: drop-shadow(0 0 10px rgba(212,175,55,0.2)); }
          50% { opacity: 0.6; filter: drop-shadow(0 0 25px rgba(212,175,55,0.6)); }
        }
        @keyframes particle-orbit {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      `}</style>

      {/* 纯白耀眼转场光效 (2秒平滑缓进) */}
      <div className={`absolute inset-0 z-50 pointer-events-none transition-all duration-[2000ms] ease-in ${isCompleted ? 'bg-white opacity-100' : 'bg-transparent opacity-0'}`}></div>

      <div className={`absolute top-32 flex items-center justify-center transition-all duration-1000 ${isCompleted ? 'opacity-0 -translate-y-4 blur-sm' : 'opacity-100 translate-y-0 blur-0'}`} style={{ animation: 'text-float 4s ease-in-out infinite' }}>
        <span className="text-[14px] font-light tracking-[0.5em]" style={{ color: '#E8E9F3', textShadow: '0 0 10px rgba(232,233,243,0.4)' }}>滑动光环以进入</span>
       <span className="ml-2 tracking-[0.1em]" style={{ 
  fontFamily: '"Didot", "Bodoni MT", "Times New Roman", serif', 
  fontStyle: 'italic', 
  fontSize: '22px', 
  fontWeight: '400', 
  color: '#FDFBF7', 
  textShadow: '0 0 15px rgba(255,245,225,0.7), 0 0 30px rgba(255,245,225,0.3)' 
}}>ME</span>
      </div>

      <div ref={containerRef} className="relative w-[280px] h-[280px] flex items-center justify-center mt-10">
        
        {/* 清晰版 3D 地球，爆炸动效覆盖完毕 */}
        <div className={`absolute w-[200px] h-[200px] rounded-full transition-all duration-[2500ms] ease-in-out ${isCompleted ? 'scale-[10] opacity-0 blur-[100px]' : 'scale-100 opacity-100'}`}
             style={{
               background: 'radial-gradient(circle at 30% 30%, #294263 0%, #112036 40%, #03060a 80%, #000000 100%)',
               boxShadow: isCompleted ? '0 0 200px 100px rgba(255,255,255,0.1)' : 'inset -25px -25px 50px rgba(0,0,0,0.9), inset 10px 10px 30px rgba(255,255,255,0.15), 0 0 60px rgba(255,255,255,0.1)',
               animation: isCompleted ? 'none' : 'earth-fast-rotation 18s linear infinite'
             }}>
        </div>

        <svg className="absolute w-full h-full pointer-events-none overflow-visible" viewBox="0 0 100 100" style={{ transform: 'rotate(-90deg)' }}>
          <defs>
            <filter id="halo-glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur1" />
              <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur2" />
              <feMerge>
                <feMergeNode in="blur2" />
                <feMergeNode in="blur1" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <circle cx="50" cy="50" r="48" fill="none" stroke="rgba(255,255,255,0.05)" strokeWidth="0.5" />
          <circle cx="50" cy="50" r="48" fill="none" stroke="#FFFFFF" strokeWidth="1.5"
                  filter="url(#halo-glow)"
                  strokeDasharray="301.59" 
                  strokeDashoffset={301.59 - (progress * 301.59)}
                  style={{ 
                    transition: isDragging || isCompleted ? 'none' : 'stroke-dashoffset 0.2s ease',
                    animation: isDragging || isCompleted ? 'none' : 'ring-breath 4s ease-in-out infinite'
                  }}
                  strokeLinecap="round" />
        </svg>

        {/* 自动环绕的星尘引导粒子 (8秒一圈流滑运动) */}
        {!isCompleted && !isDragging && (
         <div className="absolute w-full h-full pointer-events-none" style={{ animation: 'particle-orbit 8s linear infinite' }}>
            <div className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 flex items-center justify-center">
              {/* 白金光粒子本体 */}
              <div className="w-1.5 h-1.5 bg-[#FFF8E7] rounded-full shadow-[0_0_15px_4px_rgba(212,175,55,0.8)] z-10"></div>
              {/* 星尘渐变柔光尾迹 */}
              <div className="absolute top-1/2 right-1/2 w-16 h-[2px] bg-gradient-to-l from-[#FFF8E7]/60 to-transparent -translate-y-1/2 blur-[1px] rounded-full"></div>
              {/* 极简半透明方向指示箭头 */}
              <div className="absolute top-1/2 left-3 -translate-y-1/2 text-[11px] text-[#D4AF37] opacity-70 font-light tracking-tighter animate-pulse">&gt;&gt;</div>
            </div>
          </div>
        )}

        {!isCompleted && (
          <div className="absolute w-full h-full pointer-events-none" style={{ transform: `rotate(${progress * 360}deg)` }}>
            <div 
              className="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 flex items-center justify-center pointer-events-auto cursor-grab active:cursor-grabbing touch-none"
              onPointerDown={() => { setIsDragging(true); triggerHaptic('light'); }}
              onTouchStart={() => { setIsDragging(true); triggerHaptic('light'); }}
            >
              <div className={`w-3 h-3 rounded-full transition-all duration-300 ${isDragging ? 'bg-white scale-[2] shadow-[0_0_25px_rgba(255,255,255,1)]' : 'bg-white/90 shadow-[0_0_15px_rgba(255,255,255,0.8)]'}`}></div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

 const handleNext = () => {
    if (step === 2 && (!age || age < 0 || age > 120)) return;

      setIsFinalTransition(true);

      setTimeout(() => {
        setStep(8);
        setIsAnimating(false);
        setIsFinalTransition(false);

        setStep(s => s + 1);
        setIsAnimating(false);
      }, 800);

 return (

      {/* 粒子消散动画引擎 ... 保持不变 ... */}
      
      {/* 粒子消散动画引擎 */}
    {/* 混合动画引擎：粒子消散 + 水波漂浮 */}
     {/* 混合动画引擎：粒子消散 + 零重力流体悬浮 */}

          <div className={`relative w-full max-w-sm bg-[#121212]/70 backdrop-blur-[40px] border border-white/[0.08] rounded-[2.5rem] p-10 min-h-[380px] flex flex-col items-center justify-center overflow-hidden transition-all ease-in-out ${isFinalTransition ? 'duration-[3000ms] opacity-0 blur-[20px] scale-110 shadow-none' : 'duration-[1000ms] opacity-100 blur-0 scale-100 shadow-[0_20px_50px_rgba(0,0,0,0.5)]'}`}>
            <div className="absolute top-0 inset-x-0 h-px bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
            
          <div className={`w-full flex flex-col items-center justify-center transition-all duration-[800ms] ease-in-out ${isAnimating && !isFinalTransition ? 'opacity-0 blur-md translate-y-3' : 'opacity-100 blur-0 translate-y-0'}`}>
             {/* 核心修改：14秒极缓流体周期，开启 will-change 硬件加速消灭频闪，融合动态模糊与排版锁死 */}
             {/* 核心修改：14秒极缓流体周期，开启 will-change 硬件加速消灭频闪，融合动态模糊与排版锁死 */}
             {/* 核心修改：8秒纸片摇曳周期，绝对清晰，强制中文字符抱团防掉落 */}

                    <input 
                      type="number" value={age} onChange={e => setAge(e.target.value)}

            {isFinalTransition && (
              <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                {Array.from({ length: 40 }).map((_, i) => (

                         animationDelay: `${Math.random() * 0.4}s` 
                       }}>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className={`mt-14 h-10 transition-all ease-in-out ${isFinalTransition ? 'duration-[2000ms] opacity-0 blur-xl translate-y-6' : (isAnimating ? 'duration-[800ms] opacity-0 blur-sm translate-y-2' : 'duration-[800ms] opacity-100 blur-0 translate-y-0')}`}>

            </button>
          </div>
        </>
      )}

      {/* 第 8 步：深空背景 + 逼真自转地球 + 闪耀光环 */}
      {step === 8 && (
        <EarthPortal onComplete={() => {
          localStorage.setItem('onboardingCompleted', 'true');
          onFinish();
        }} />
      )}

    </div>
  );

// 终极防息屏引擎 (全局单例，必须由物理点击触发)
// ==========================================
// ==========================================
// 终极防息屏引擎 (工业级 NoSleep.js 方案)
// 彻底解决 HTTP 协议限制与 iOS 微信拦截问题
// ==========================================
let noSleepInstance = null;

const fireNoSleepEngine = () => {
  try {
    if (!noSleepInstance) {
      noSleepInstance = new NoSleep();
    }
    noSleepInstance.enable();
  } catch (err) {
    console.log("NoSleep 唤醒受限:", err);
  }
};

const killNoSleepEngine = () => {
  try {
    if (noSleepInstance) {
      noSleepInstance.disable();
    }
  } catch (err) {}
};

// ==========================================
function CloudBubble({ children, onClick, delay = '0s', className = '' }) {
  const [isPressed, setIsPressed] = React.useState(false);
  const handlePointerDown = () => { setIsPressed(true); triggerHaptic('light'); };
  const handlePointerUp = () => setIsPressed(false);
  
  return (
    <div 
      className={`relative flex items-center justify-center cursor-pointer ${className}`}
      style={{
        animation: `cloud-float-breathe 6s ease-in-out infinite`,
        animationDelay: delay,
        transform: isPressed ? 'scale(0.96) translateY(2px)' : 'scale(1) translateY(0px)',
        transition: 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)',
        willChange: 'transform' 
      }}
      onPointerDown={handlePointerDown}
      onPointerUp={handlePointerUp}
      onPointerLeave={handlePointerUp}
      onClick={onClick}
    >
      <div 
        className="absolute inset-[-25%] z-0 pointer-events-none"
        style={{ 
          opacity: isPressed ? 0.8 : 1,
          transition: 'opacity 0.4s ease',
          filter: 'drop-shadow(0 20px 40px rgba(0,0,0,0.3))'
        }}

function MusicPlayerButton({ src, isDying, isFocused }) {
  const [isPlaying, setIsPlaying] = React.useState(false);
  const audioRef = React.useRef(null);

  React.useEffect(() => {
    if (isDying && audioRef.current) {
      audioRef.current.pause();
      setIsPlaying(false);
    }
  }, [isDying]);

  const togglePlay = (e) => {
    e.stopPropagation(); 
    if (typeof triggerHaptic !== 'undefined') triggerHaptic('light');
    if (audioRef.current) {
      if (isPlaying) { audioRef.current.pause(); setIsPlaying(false); }
      else { audioRef.current.play(); setIsPlaying(true); }
    }
  };

  return (
    <div 
      className="relative w-12 h-12 flex items-center justify-center pointer-events-auto cursor-pointer z-50 mt-4 group"
      onClick={togglePlay}
      style={{
         opacity: isDying ? 0 : 1,
         transition: isFocused ? 'opacity 0.6s ease-in 0.5s' : 'none' 
      }}
    >
      {/* 高级感核心：超细边框 + 中度毛玻璃 */}

function MeSpaceMode({ onExit }) {
  const [stage, setStage] = useState('greeting');
  const [replyText, setReplyText] = useState('');
  const [focusAction, setFocusAction] = useState(null);
  
  const [dismissedActions, setDismissedActions] = useState([]);
  const [activeClouds, setActiveClouds] = useState([]);

  const physics = useRef([]);
  const animationRef = useRef(null);
  const lastSpawnRef = useRef(0);

  // 引擎 1：严格的场景流转控制
  useEffect(() => {
    let t1, t2;
    if (stage === 'reply') {
      t1 = setTimeout(() => setStage('fade'), 4000);
    } else if (stage === 'fade') {
      t2 = setTimeout(() => setStage('actions'), 3000);
    }
    return () => { clearTimeout(t1); clearTimeout(t2); };
  }, [stage]);

  // 引擎 2：60FPS 柔性物理与弹幕生命周期引擎
  useEffect(() => {
    if (stage !== 'actions') return;

    const updatePhysics = () => {
      const now = Date.now();
      const w = window.innerWidth;
      const h = window.innerHeight;

      // 1. 弹幕发射器 (每 2.5 秒随机方向发射一次)
      if (now - lastSpawnRef.current > 2500) {
        const available = WASTE_ACTIONS.map((_, i) => i).filter(i => 
          !dismissedActions.includes(i) && 
          i !== focusAction && 
          !physics.current.some(c => c.actionIndex === i)
        );

        if (available.length > 0) {
          const actionIndex = available[Math.floor(Math.random() * available.length)];
          const edge = Math.floor(Math.random() * 4); // 0上 1右 2下 3左
          let x, y, vx, vy;
          const speed = 0.4 + Math.random() * 0.4; // 极缓飘动速度

          if (edge === 0) { x = Math.random() * w; y = -150; vx = (Math.random() - 0.5); vy = speed; }
          else if (edge === 1) { x = w + 150; y = Math.random() * h; vx = -speed; vy = (Math.random() - 0.5); }
          else if (edge === 2) { x = Math.random() * w; y = h + 150; vx = (Math.random() - 0.5); vy = -speed; }
          else { x = -150; y = Math.random() * h; vx = speed; vy = (Math.random() - 0.5); }

          physics.current.push({ id: `c_${now}`, actionIndex, x, y, vx, vy, isDying: false });
          lastSpawnRef.current = now;
        }
      }

      const clouds = physics.current;
      for (let i = 0; i < clouds.length; i++) {
        let c1 = clouds[i];
        if (c1.actionIndex === focusAction || c1.isDying) continue; 

        c1.x += c1.vx;
        c1.y += c1.vy;

        for (let j = i + 1; j < clouds.length; j++) {
          let c2 = clouds[j];
          if (c2.actionIndex === focusAction || c2.isDying) continue;

          let dx = c1.x - c2.x;
          let dy = c1.y - c2.y;
          let dist = Math.sqrt(dx * dx + dy * dy);
          const minDistance = 200; 
          if (dist < minDistance && dist > 0) {
            let force = (minDistance - dist) / minDistance;
            let fx = (dx / dist) * force * 1.2;
            let fy = (dy / dist) * force * 1.2;
            c1.x += fx; c1.y += fy;
            c2.x -= fx; c2.y -= fy;
          }
        }
      }

      physics.current = physics.current.filter(c => {
        if (c.isDying && now - c.dieTime > 1500) return false;
        if (!c.isDying && c.actionIndex !== focusAction && (c.x < -400 || c.x > w + 400 || c.y < -400 || c.y > h + 400)) return false;
        return true;
      });

      setActiveClouds([...physics.current]);
      animationRef.current = requestAnimationFrame(updatePhysics);
    };

    animationRef.current = requestAnimationFrame(updatePhysics);
    return () => cancelAnimationFrame(animationRef.current);
  }, [stage, focusAction, dismissedActions]);

 const handleReply = (isGood) => {

      <div className="absolute inset-0 z-0">

     {/* 第四幕：左上角极简退出键 */}
      <div className="absolute top-8 left-8 z-[600] pointer-events-none">
        <button 
          onClick={(e) => { e.stopPropagation(); triggerHaptic('medium'); onExit(); }} 
          className="w-10 h-10 flex items-center justify-center rounded-full bg-white/5 backdrop-blur-md border border-white/10 text-white/40 hover:text-white/90 hover:bg-white/10 active:scale-90 transition-all pointer-events-auto"
        >
          <X size={20} strokeWidth={1.5} />
        </button>
      </div>

      {/* 第二幕：寒暄场景 - 适配手机且选项下置版 */}
      <div className={`absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-20 transition-all duration-[2000ms] ease-in-out ${stage === 'fade' || stage === 'actions' ? 'opacity-0 blur-md scale-110' : 'opacity-100 blur-0 scale-100'}`}>
        
        {/* 文字卡片：宽度自适应，增加 max-w 限制防止溢出 */}
        <div className="pointer-events-auto w-fit max-w-[calc(100vw-64px)] mx-auto">
          <div className="relative bg-[#121212]/70 backdrop-blur-[40px] border border-white/[0.08] rounded-[2.5rem] px-10 py-12 flex flex-col items-center justify-center overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)]"
               style={{ animation: 'paper-light-float 8s ease-in-out infinite' }}>
            <div className="absolute top-0 inset-x-0 h-px bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>

              <p className="whitespace-pre-line drop-shadow-md">
                {stage === 'greeting' ? "欢迎回来，我的朋友。\n你最近好么？" : replyText}
              </p>
            </div>
          </div>
        </div>

       {/* 选项按钮：升级为悬浮微光胶囊，增强背景上的存在感 */}
        {stage === 'greeting' && (
          <div className="mt-16 flex gap-10 pointer-events-auto">
            <button 
              onClick={(e) => { e.stopPropagation(); handleReply(true); }} 
              className="px-10 py-3.5 bg-white/5 backdrop-blur-md border border-white/10 rounded-full text-[12px] tracking-[0.5em] text-white/80 hover:text-white hover:bg-white/10 hover:border-white/20 transition-all uppercase active:scale-95 shadow-[0_10px_30px_rgba(0,0,0,0.3)] animate-pulse"
            >
              好。
            </button>
            <button 
              onClick={(e) => { e.stopPropagation(); handleReply(false); }} 
              className="px-10 py-3.5 bg-white/5 backdrop-blur-md border border-white/10 rounded-full text-[12px] tracking-[0.5em] text-white/80 hover:text-white hover:bg-white/10 hover:border-white/20 transition-all uppercase active:scale-95 shadow-[0_10px_30px_rgba(0,0,0,0.3)] animate-pulse"
            >
              不好。
            </button>
          </div>
        )}
      </div>

     {/* 第三幕：暗色遮罩与消散触发器 */}
      <div 
        className={`absolute inset-0 transition-all duration-1000 z-10 ${focusAction !== null ? 'bg-black/60 backdrop-blur-sm pointer-events-auto' : 'bg-transparent pointer-events-none'}`} 
        onPointerDown={handleBackgroundClick}
      ></div>

      {/* 第三幕：流体渲染层 */}
      {stage === 'actions' && (
        <div className="absolute inset-0 z-30 pointer-events-none overflow-hidden">
          {activeClouds.map((c, i) => {
            const isFocused = focusAction === c.actionIndex;
            const isHidden = focusAction !== null && !isFocused;
            const actionData = WASTE_ACTIONS[c.actionIndex];

            // 核心交互动画重构：控制云朵与文字的时间差
            const styles = {
              left: isFocused ? '50%' : `${c.x}px`,
              top: isFocused ? '50%' : `${c.y}px`,
              // 退出时：巨幅放大 (scale 4) 模拟视线直接穿透气层、冲入云霄的物理真实感
              transform: isFocused ? 'translate(-50%, -50%) scale(1.5)' 
                       : c.isDying ? 'translate(-50%, -50%) scale(4)'
                       : 'translate(-50%, -50%) scale(1)',
              opacity: c.isDying || isHidden ? 0 : 1,
              filter: c.isDying || isHidden ? 'blur(20px)' : 'none',
              zIndex: isFocused ? 100 : 30,
              // 退出延迟：云朵延迟 0.3s 执行动画（为了给字体先消失留出时间）
              transition: isFocused ? 'all 0.8s cubic-bezier(0.23, 1, 0.32, 1)' 
                        : c.isDying ? 'all 1.2s cubic-bezier(0.4, 0, 0.2, 1) 0.3s' 
                        : 'opacity 0.8s, filter 0.8s',
              pointerEvents: (focusAction !== null && !isFocused) ? 'none' : 'auto'
            };

            return (
              <div key={c.id} className="absolute" style={styles}>
                <CloudBubble 
                  delay={`${i * 1.1}s`}
                  onClick={(e) => { 
                    e.stopPropagation(); 
                    if (focusAction === null && !c.isDying) { 
                      setFocusAction(c.actionIndex); 
                      triggerHaptic('light'); 
                    }
                  }}
                  className={`transition-all duration-700 ${isFocused ? 'w-[480px] h-[360px]' : 'w-[240px] h-[160px]'}`}
                >
               {/* 核心修复：文字容器宽度限制在 65%，增加溢出隐藏，彻底锁死防穿模 */}

    }
  }, [toast]);

const [isSyncing, setIsSyncing] = useState(false);

  const handleCloudPush = async () => {
    if (isSyncing) return;
    triggerHaptic('medium');
    setIsSyncing(true);
    setToast({ title: "同步中", desc: "正在备份至云端..." });
    try {
      const payload = { userId, records, todos, categories, userState };
      const res = await fetch(`https://iseeme9.top/sync.php`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error();
      triggerHaptic('heavy');
      setToast({ title: "备份成功", desc: "数据已安全存储。" });
    } catch (err) {
      setToast({ title: "同步失败", desc: "网络连接异常。" });
    } finally { setIsSyncing(false); }
  };

  const handleCloudPull = async () => {
    if (isSyncing) return;
    triggerHaptic('light');
    setIsSyncing(true);
    setToast({ title: "同步中", desc: "正在拉取云端存档..." });
    try {
      const res = await fetch(`https://iseeme9.top/sync.php?userId=${userId}`);
      const jsonData = await res.json();
      if (jsonData.records) {
        localStorage.setItem(`timeflow_records_${userId}`, JSON.stringify(jsonData.records));
        localStorage.setItem(`timeflow_todos_${userId}`, JSON.stringify(jsonData.todos || []));
        localStorage.setItem(`timeflow_state_${userId}`, JSON.stringify(jsonData.userState || {}));
        localStorage.setItem(`timeflow_cats_${userId}`, JSON.stringify(jsonData.categories || DEFAULT_CATEGORIES));
        setToast({ title: "同步完成", desc: "系统正在重启..." });
        setTimeout(() => window.location.reload(), 1500);
      } else { throw new Error(); }
    } catch (err) {
      setToast({ title: "拉取失败", desc: "云端暂无此 ID 的数据。" });
    } finally { setIsSyncing(false); }
  };
  const [isLandscape, setIsLandscape] = useState(false);
  const [forcePortrait, setForcePortrait] = useState(false);
  
  const [userId, setUserId] = useState(() => {
    let id = localStorage.getItem('timeflow_user_id');
    if (!id) { id = generateUUID(); localStorage.setItem('timeflow_user_id', id); }
    return id;
  });

  const [records, setRecords] = useState([]);
  const [todos, setTodos] = useState([]); 
  const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
  const [userState, setUserState] = useState({ 
    streak: 0, lastRecordDate: new Date(0).toISOString(), unlockedMilestones: [], theme: 'dark'
  });

  const [isDataLoaded, setIsDataLoaded] = useState(false);

 // 1. 初次引导状态记忆
  const [hasCompletedOnboarding, setHasCompletedOnboarding] = useState(() => 
    localStorage.getItem('onboardingCompleted') === 'true'
  );

  // 确保白天/黑夜模式能正确应用到整个网页的底层
  useEffect(() => {
    if (userState.theme === 'light') {
      document.documentElement.classList.add('theme-light');
    } else {
      document.documentElement.classList.remove('theme-light');
    }
  }, [userState.theme]);

  // 2. 屏幕常亮与 Resize 监听
  useEffect(() => {
    const handleResize = () => {
      const isLand = (window.innerWidth / window.innerHeight) > 1.2;
      if (!isLand) setForcePortrait(false); 
      setIsLandscape(isLand);
    };
    window.addEventListener('resize', handleResize);
    handleResize(); 
    return () => window.removeEventListener('resize', handleResize);
  }, []);

  // 3. 数据持久化加载 (工业级防静默崩溃版)
  useEffect(() => {
    try {
      const localRecords = localStorage.getItem(`timeflow_records_${userId}`);
      const localTodos = localStorage.getItem(`timeflow_todos_${userId}`);
      const localState = localStorage.getItem(`timeflow_state_${userId}`);
      const localCategories = localStorage.getItem(`timeflow_cats_${userId}`);

      setRecords(localRecords ? JSON.parse(localRecords) : []);
      setTodos(localTodos ? JSON.parse(localTodos) : []);
      setCategories(localCategories ? JSON.parse(localCategories) : DEFAULT_CATEGORIES);
      
      const parsedState = localState ? JSON.parse(localState) : {};
      setUserState({ 
        streak: parsedState.streak || 0, 
        lastRecordDate: parsedState.lastRecordDate || new Date(0).toISOString(),
        unlockedMilestones: parsedState.unlockedMilestones || [], 
        theme: parsedState.theme || 'dark',
        userName: parsedState.userName || ''
      });
    } catch (error) {
      // 核心防御：一旦发现浏览器里存的数据坏了，立即清空旧数据并重新初始化，绝对不让程序卡死
      console.warn("检测到本地数据损坏，正在执行安全重置...");
      setRecords([]);
      setTodos([]);
      setCategories(DEFAULT_CATEGORIES);
      setUserState({ streak: 0, lastRecordDate: new Date(0).toISOString(), unlockedMilestones: [], theme: 'dark', userName: '' });
    } finally {
      // 无论数据是好是坏，强制宣告加载完成，并解除启动页的锁定

        function useLongPress(callback, onClick, ms = 500) {
          const timerRef = useRef(null);
          const start = (e) => {
            timerRef.current = setTimeout(() => {
              timerRef.current = null;
              callback(e);
            }, ms);
          };
          const clear = (e) => {
            if (timerRef.current) {
              clearTimeout(timerRef.current);
              timerRef.current = null;
              onClick(e);
            }
          };
          return {
            onPointerDown: start,
            onPointerUp: clear,
            onPointerLeave: clear,
            onContextMenu: e => e.preventDefault()
          };
        }

        const CategoryButton = ({ cat, onClick, onLongPress }) => {
          const handlers = useLongPress(
            (e) => { if (e) e.stopPropagation(); onLongPress(); }, 
            (e) => { if (e) e.stopPropagation(); onClick(); }, 
            500
          );
          const IconComp = ICON_MAP[cat.iconKey] || Target;
          
          return (
            <button 
              {...handlers}
              className="relative flex flex-col items-center gap-2 active:scale-90 transition-all duration-300 w-[4rem] pointer-events-auto"
            >
              <div className="w-[3.5rem] h-[3.5rem] rounded-full flex items-center justify-center bg-app-fg text-app-bg transition-colors shadow-lg">
                <IconComp size={20} strokeWidth={2.2} />
              </div>
              <span className="text-[10px] font-bold tracking-widest text-app-fg-muted">{cat.name}</span>
            </button>
          );
        };

        const SwipeToExit = ({ onExit }) => {
          const [dragX, setDragX] = useState(0);
          const isDragging = useRef(false);
          const startX = useRef(0);
          const MAX_DRAG = 180;

          const onDown = (clientX) => {
            isDragging.current = true;
            startX.current = clientX - dragX;
            triggerHaptic('light');
          };
          const onMove = (clientX) => {
            if (!isDragging.current) return;
            const newX = Math.max(0, Math.min(clientX - startX.current, MAX_DRAG));
            setDragX(newX);
          };
          const onUp = () => {
            isDragging.current = false;
            if (dragX >= MAX_DRAG * 0.9) {
              triggerHaptic('heavy');
              onExit();
            } else {
              setDragX(0);
            }
          };
          return (
            <div className="relative w-[240px] h-12 bg-[var(--swipe-bg)] border border-[var(--swipe-border)] rounded-full flex items-center justify-center backdrop-blur-md overflow-hidden touch-none pointer-events-auto opacity-40 hover:opacity-100 transition-opacity duration-500">
              <span className="text-[11px] tracking-widest text-[var(--swipe-text)] uppercase pl-6 pointer-events-none select-none">滑动以退出当前界面</span>
              <div 
                className="absolute left-1 top-1 w-10 h-10 bg-[var(--swipe-thumb)] hover:bg-[var(--swipe-thumb-hover)] text-[var(--swipe-icon)] rounded-full flex items-center justify-center cursor-grab transition-colors shadow-sm"
                style={{ transform: `translateX(${dragX}px)`, transition: isDragging.current ? 'none' : 'transform 0.3s ease-out' }}
                onPointerDown={(e) => { e.target.setPointerCapture(e.pointerId); onDown(e.clientX); }}
                onPointerMove={(e) => onMove(e.clientX)}
                onPointerUp={(e) => { e.target.releasePointerCapture(e.pointerId); onUp(); }}
              >
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                  <circle cx="12" cy="12" r="5" fill="currentColor" fillOpacity="0.2" />
                  <ellipse cx="12" cy="12" rx="11" ry="3" transform="rotate(-25 12 12)" />
                </svg>
              </div>
            </div>
          );
        };

function DynamicRing({ isRecording, trackingStartTime, userState }) {
  const [now, setNow] = useState(new Date());
  useEffect(() => {
    const interval = setInterval(() => setNow(new Date()), 1000);
    return () => clearInterval(interval);
  }, []);
  
  const CENTER = 120;
  const RADIUS = 115; 

  // 计算剩余时间
  const midnight = new Date(now);
  midnight.setHours(24, 0, 0, 0);
  const remainingSeconds = Math.max(0, Math.floor((midnight.getTime() - now.getTime()) / 1000));
  const h = Math.floor(remainingSeconds / 3600);
  const m = Math.floor((remainingSeconds % 3600) / 60);
  const s = remainingSeconds % 60;
  const pad = n => n.toString().padStart(2, '0');

  // 核心视觉状态判定：是否点亮星轨

    <div className="relative w-full aspect-square max-w-[280px] mx-auto flex items-center justify-center mt-4 ring-master-container">
      
      <style>{`
        .ring-master-container {

          --ring-glow: rgba(255, 255, 255, 0.3);
          --ring-track: rgba(255, 255, 255, 0.05);
        }
        :root.theme-light .ring-master-container {

          --ring-glow: rgba(212, 175, 55, 0.25);
          --ring-track: rgba(212, 175, 55, 0.08);
        }

        /* 闲置流体：顺时针极缓 */
        @keyframes ring-flow-rotate {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }

        /* 点亮流体：逆时针加速，展现能量汇聚 */
        @keyframes ring-flow-reverse {
          0% { transform: rotate(360deg); }
          100% { transform: rotate(0deg); }
        }

        @keyframes star-breathe {
          0%, 100% { opacity: 0.2; transform: scale(0.8) translateZ(0); }
          50% { opacity: 0.9; transform: scale(1.2) translateZ(0); }
        }

        @keyframes triangle-fade-pulse {
          0%, 100% { opacity: 0.1; }
          50% { opacity: 0.3; }
        }

        .gpu-accel {
          will-change: transform;
          transform: translateZ(0);

      {/* 物理环体：根据状态切换旋转方向与光晕强度 */}
      <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-0">
        <div className="absolute w-[95.83%] h-[95.83%] rounded-full border border-[var(--ring-track)] transition-all duration-1000"></div>
        
        <div

          style={{

            WebkitMask: 'linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0)',
            WebkitMaskComposite: 'xor',
            maskComposite: 'exclude',
            // 点亮星轨时：动画反转且加速 (18s -> 10s)，光晕增强
            animation: isLit ? 'ring-flow-reverse 10s linear infinite' : 'ring-flow-rotate 18s linear infinite',
            filter: isLit ? 'drop-shadow(0 0 10px var(--ring-glow))' : 'drop-shadow(0 0 5px var(--ring-glow))'
          }}

      </div>

      <svg className="absolute inset-0 w-full h-full overflow-visible z-10 pointer-events-none" viewBox="0 0 240 240">
        <defs>
          <radialGradient id="star-nebula-gradient">

          {/* 高速环绕的伴星群 (5颗) */}
          {[0, 72, 144, 216, 288].map((angle, i) => (
            <g key={`outer-${i}`} style={{ transform: `rotate(${angle}deg)`, transformOrigin: '120px 120px' }}>
              <circle 
                cx="120" cy="-3"

                fill="var(--ring-core)" 
                opacity={0.6 + (i * 0.1)} 
                style={{ filter: 'drop-shadow(0 0 4px var(--ring-glow))' }} 
              />
            </g>
          ))}
        </g>
      </svg>
      
      <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-0">
         <div className="w-32 h-32 rounded-full transition-all duration-1000" style={{

        <div className="flex items-center tabular-nums text-[var(--fg-app)] transition-all duration-1000" style={{ transform: isLit ? 'scale(1.05)' : 'scale(1)' }}>

              <span className="text-4xl font-semibold tracking-tight opacity-30">{pad(s)}</span>

        </div>
        <span className="text-[11px] tracking-widest font-bold text-[var(--fg-app-muted)] mt-3 uppercase transition-colors duration-1000" style={{ color: isLit ? 'var(--ring-core)' : 'var(--fg-app-muted)' }}>
          {isLit ? '星轨已激活' : (userState?.userName ? '档案代号已同步' : '今日剩余可用时间')}
        </span>
      </div>
    </div>
  );
}






        function LiveTimer({ startTime }) {
          const [elapsed, setElapsed] = useState(0);
          useEffect(() => {
            const updateTimer = () => setElapsed(Math.max(0, Math.floor(Date.now() / 1000) - startTime));
            updateTimer(); const interval = setInterval(updateTimer, 1000); return () => clearInterval(interval);
          }, [startTime]);
          const h = Math.floor(elapsed / 3600), m = Math.floor((elapsed % 3600) / 60), s = elapsed % 60;
          const pad = n => n.toString().padStart(2, '0');
          return <h1 className="text-4xl font-semibold tracking-tight text-app-fg tabular-nums">{h > 0 ? `${pad(h)}:` : ''}{pad(m)}:{pad(s)}</h1>;
        }
